plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'expo.modules.transnet'
version = '0.1.0'

repositories {
  maven { url = uri("libs/repo") }
}

android {
  namespace "expo.modules.transnet"
  defaultConfig {
    versionCode 1
    versionName "0.1.0"
  }
  lintOptions {
    abortOnError false
  }
}

dependencies {
  implementation 'expo.modules:transnetcore:0.1.0'
}
